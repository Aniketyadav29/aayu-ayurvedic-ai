name: Keep Render Awake

on:
  schedule:
    # GitHub Actions supports minimum 5-minute intervals.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve URL
        id: resolve
        env:
          SECRET_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          if [ -n "$SECRET_URL" ]; then
            echo "url=$SECRET_URL" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://aayu-ayurvedic-ai-1.onrender.com/health" >> "$GITHUB_OUTPUT"
          fi

      - name: Ping Render health URL
        run: |
          URL="${{ steps.resolve.outputs.url }}"
          echo "Pinging $URL"
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$URL")
          echo "HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "Keepalive ping failed"
            exit 1
          fi
