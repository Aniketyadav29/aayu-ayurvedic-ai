name: Keep Render Awake

'on':
  schedule:
    # GitHub Actions supports minimum 5-minute intervals.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve URL
        id: resolve
        env:
          SECRET_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          if [ -n "$SECRET_URL" ]; then
            echo "url=$SECRET_URL" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://aayu-ayurvedic-ai-1.onrender.com/health" >> "$GITHUB_OUTPUT"
          fi

          ROOT_URL="${SECRET_URL%/health}"
          if [ -z "$ROOT_URL" ] || [ "$ROOT_URL" = "$SECRET_URL" ]; then
            ROOT_URL="https://aayu-ayurvedic-ai-1.onrender.com"
          fi
          echo "root_url=$ROOT_URL" >> "$GITHUB_OUTPUT"

      - name: Ping Render health URL
        continue-on-error: true
        run: |
          PRIMARY_URL="${{ steps.resolve.outputs.url }}"
          ROOT_URL="${{ steps.resolve.outputs.root_url }}"
          ATTEMPT=1
          MAX_ATTEMPTS=4
          SUCCESS=0

          ping_url() {
            TARGET="$1"
            HTTP_CODE=$(curl -sS -L -o /dev/null -w "%{http_code}" --max-time 45 "$TARGET" || echo "000")
            echo "URL: $TARGET -> HTTP $HTTP_CODE"
            if [[ "$HTTP_CODE" =~ ^[0-9]{3}$ ]] && [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ]; then
              return 0
            fi
            return 1
          }

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS"

            if ping_url "$PRIMARY_URL"; then
              SUCCESS=1
              break
            fi

            if ping_url "$ROOT_URL"; then
              SUCCESS=1
              break
            fi

            ATTEMPT=$((ATTEMPT + 1))
            if [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; then
              echo "Retrying in 20s..."
              sleep 20
            fi
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "Warning: keepalive ping did not get a healthy response, but workflow will continue."
          fi

      - name: Trigger daily reminder dispatcher
        continue-on-error: true
        env:
          REMINDER_CRON_TOKEN: ${{ secrets.REMINDER_CRON_TOKEN }}
        run: |
          ROOT_URL="${{ steps.resolve.outputs.root_url }}"
          echo "Calling reminder dispatcher on $ROOT_URL/send-reminders"
          if [ -n "$REMINDER_CRON_TOKEN" ]; then
            curl -sS -X POST "$ROOT_URL/send-reminders" -H "X-Reminder-Token: $REMINDER_CRON_TOKEN" || true
          else
            curl -sS -X POST "$ROOT_URL/send-reminders" || true
          fi
