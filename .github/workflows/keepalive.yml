name: Keep Render Awake

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # GitHub Actions supports minimum 5-minute intervals.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Ping Render health URL
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
          PING_TIMEOUT_SECONDS: '20'
        run: |
          python scripts/keepalive_ping.py
