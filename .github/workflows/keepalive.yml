name: Keep Render Awake

on:
  schedule:
    # GitHub Actions supports minimum 5-minute intervals.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve URL
        id: resolve
        env:
          SECRET_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          if [ -n "$SECRET_URL" ]; then
            echo "url=$SECRET_URL" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://aayu-ayurvedic-ai-1.onrender.com/health" >> "$GITHUB_OUTPUT"
          fi

      - name: Ping Render health URL
        run: |
          URL="${{ steps.resolve.outputs.url }}"
          echo "Pinging $URL"
          ATTEMPT=1
          MAX_ATTEMPTS=4
          SUCCESS=0

          while [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; do
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS"
            HTTP_CODE=$(curl -sS -L -o /dev/null -w "%{http_code}" --max-time 45 "$URL" || echo "000")
            echo "HTTP $HTTP_CODE"

            if [[ "$HTTP_CODE" =~ ^[0-9]{3}$ ]] && [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
              SUCCESS=1
              break
            fi

            ATTEMPT=$((ATTEMPT + 1))
            if [ "$ATTEMPT" -le "$MAX_ATTEMPTS" ]; then
              echo "Retrying in 20s..."
              sleep 20
            fi
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "Keepalive ping failed after retries"
            exit 1
          fi
